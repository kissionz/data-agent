name: PostgreSQL integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: postgres-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start PostgreSQL fixture
        run: docker compose -f docker-compose.postgres.yml up -d --wait

      - name: Run real PostgreSQL integration gate
        env:
          CHATBI_TEST_POSTGRES_URL: postgresql://chatbi_reader:chatbi_reader@127.0.0.1:55432/chatbi_test
          CHATBI_TEST_POSTGRES_ADMIN_URL: postgresql://chatbi_admin:chatbi_admin@127.0.0.1:55432/chatbi_test
        run: pnpm run test:integration:postgres

      - name: Capture PostgreSQL logs on failure
        if: failure()
        run: docker compose -f docker-compose.postgres.yml logs --no-color

      - name: Stop PostgreSQL fixture
        if: always()
        run: docker compose -f docker-compose.postgres.yml down --volumes
